<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Fahril Datacenter</title>
    <style>
        /* ================= CSS & THEME ================= */
        :root {
            --bg-color: #0b0c10; /* Tidak terlalu gelap, tema space */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #45f3ff;
            --accent: #ff2770;
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1a1b2e 0%, #080812 100%);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Canvas Background */
        #galaxy-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none; /* Biar gak ganggu klik */
        }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #080812; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-out;
        }
        .welcome-text {
            font-size: 2.5rem; font-weight: bold; text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite, float 3s ease-in-out infinite;
            padding: 20px;
        }

        /* Glassmorphism Containers */
        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: none; /* Disembunyikan sampai auth/preloader selesai */
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .container.show { opacity: 1; transform: translateY(0); display: block; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Forms & Inputs */
        h2 { color: var(--primary); margin-bottom: 20px; }
        input[type="email"], input[type="password"], input[type="file"] {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: #fff; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(69, 243, 255, 0.2); }
        
        button {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: #fff; border: none; padding: 12px 25px; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 39, 112, 0.4); }
        button.btn-danger { background: linear-gradient(45deg, #ff2770, #ff4b2b); }

        /* Dashboard Grid */
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .file-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;
        }
        .file-card {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; text-align: center;
            transition: transform 0.3s;
        }
        .file-card:hover { transform: scale(1.02) translateY(-5px); }
        .file-card img { max-width: 100%; height: 150px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; }
        .file-card p { word-break: break-all; font-size: 0.9rem; margin-bottom: 10px; }
        .card-actions { display: flex; justify-content: space-around; }

        /* Animations */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* Responsive */
        @media (max-width: 768px) {
            .welcome-text { font-size: 1.8rem; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Animasi Preloader 5 Detik -->
    <div id="preloader">
        <div class="welcome-text">Welcome to<br>Ahmad Fahril Datacenter<br><span style="font-size: 1.2rem; font-weight: normal; color: #fff;">Developed by Ahmad Fahril</span></div>
    </div>

    <!-- Canvas Background Galaxy -->
    <canvas id="galaxy-canvas"></canvas>

    <!-- Halaman Login -->
    <div id="login-section" class="container glass-panel" style="max-width: 400px; margin-top: 10vh;">
        <h2>Login Akses Biometrik / Email</h2>
        <input type="email" id="email" placeholder="Email Anda" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn" style="width: 100%;">Masuk / Daftar</button>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #aaa;">*Sistem otomatis mendaftar jika email belum ada.</p>
    </div>

    <!-- Halaman Dashboard (Datacenter) -->
    <div id="dashboard-section" class="container">
        <div class="glass-panel header">
            <div>
                <h2>Datacenter Pribadi</h2>
                <p id="user-info">Login sebagai: </p>
            </div>
            <button id="logout-btn" class="btn-danger">Keluar</button>
        </div>

        <div class="glass-panel">
            <h3>Upload File Baru (KTP, KK, dll)</h3>
            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">*Gambar otomatis dikompres agar masuk gratis di Firestore.</p>
            <input type="file" id="file-input" accept="image/*">
            <button id="upload-btn">Upload ke Server</button>
        </div>

        <div class="file-grid" id="file-gallery">
            <!-- Data file akan muncul di sini via Javascript -->
        </div>
    </div>

  <!-- ================= JAVASCRIPT & FIREBASE ================= -->
<script type="module">
    // 1. IMPORT FIREBASE MENGGUNAKAN CDN (Wajib untuk Plain HTML)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    
    // Import Auth dan Firestore yang dibutuhkan untuk fitur datacenter Anda
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. CONFIG FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyCqDdj5gTLPrFd-yYhDUJ__w8w-5ZOxk_M",
        authDomain: "amdfdatacenter.firebaseapp.com",
        projectId: "amdfdatacenter",
        storageBucket: "amdfdatacenter.firebasestorage.app",
        messagingSenderId: "484525213430",
        appId: "1:484525213430:web:d7aff2639a8fd26cd28ed7",
        measurementId: "G-Q30G094058"
    };

    // 3. INITIALIZE FIREBASE & LAYANANNYA
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app); // Wajib diinisialisasi untuk login
    const db = getFirestore(app); // Wajib diinisialisasi untuk upload file

    // 4. REFERENSI UI & LOGIC
    const preloader = document.getElementById('preloader');
    const loginSection = document.getElementById('login-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const fileGallery = document.getElementById('file-gallery');
    
    let currentUser = null;
    let unsubscribeRealtime = null;

    // LOGIC PRELOADER 5 DETIK
    setTimeout(() => {
        preloader.style.opacity = '0';
        setTimeout(() => { preloader.style.display = 'none'; }, 1000);
        
        // Panggil fungsi cek status login (pastikan fungsi checkAuthStatus() sudah ada di kode Anda selanjutnya)
        if (typeof checkAuthStatus === "function") {
            checkAuthStatus(); 
        }
    }, 3000);

        // 4. ANIMASI GALAXY BACKGROUND (Canvas merespon kursor)
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? '#45f3ff' : '#ffffff';
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0; else if(this.x < 0) this.x = canvas.width;
                if(this.y > canvas.height) this.y = 0; else if(this.y < 0) this.y = canvas.height;
                
                // Efek kursor
                if(mouse.x != null) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    if(distance < 100) {
                        this.x -= dx/20; this.y -= dy/20;
                    }
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i=0; i<150; i++) particles.push(new Particle());
        
        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // 5. AUTHENTICATION SYSTEM (Login / Register otomatis)
        function checkAuthStatus() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('user-info').innerText = `Login sebagai: ${user.email}`;
                    loginSection.classList.remove('show');
                    setTimeout(() => dashboardSection.classList.add('show'), 500);
                    loadDataFirestore();
                } else {
                    currentUser = null;
                    dashboardSection.classList.remove('show');
                    if (unsubscribeRealtime) unsubscribeRealtime();
                    setTimeout(() => loginSection.classList.add('show'), 500);
                }
            });
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Isi email dan password!");
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    // Jika belum ada, kita buat akunnya (auto-register)
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                        alert("Akun baru berhasil dibuat & login!");
                    } catch (err) { alert("Error: " + err.message); }
                } else { alert("Error: " + error.message); }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // 6. FIRESTORE LOGIC & IMAGE COMPRESSION
        // Fungsi kompresi gambar agar selalu < 1MB untuk Firestore
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        
                        const cvs = document.createElement('canvas');
                        cvs.width = width; cvs.height = height;
                        const ctxCvs = cvs.getContext('2d');
                        ctxCvs.drawImage(img, 0, 0, width, height);
                        resolve(cvs.toDataURL('image/jpeg', quality)); // Konversi ke JPEG base64 compressed
                    };
                };
            });
        }

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file gambar dulu!");
            if (!currentUser) return;

            document.getElementById('upload-btn').innerText = "Mengupload...";
            
            try {
                // Kompres gambar menjadi base64 ringan (Max 1200px, 70% quality)
                const base64Data = await compressImage(file, 1200, 1200, 0.7);
                
                await addDoc(collection(db, "userFiles"), {
                    uid: currentUser.uid,
                    fileName: file.name,
                    fileData: base64Data, // Data gambar base64
                    timestamp: serverTimestamp()
                });
                
                alert("File berhasil diupload & diamankan!");
                fileInput.value = "";
            } catch (error) {
                console.error(error);
                alert("Gagal upload! Pastikan rule Firestore sudah diatur. Pesan: " + error.message);
            }
            document.getElementById('upload-btn').innerText = "Upload ke Server";
        });

        // 7. REALTIME FIRESTORE LISTENER (Menampilkan & Mengunduh)
        function loadDataFirestore() {
            if (!currentUser) return;
            const q = query(collection(db, "userFiles"), where("uid", "==", currentUser.uid));
            
            // onSnapshot membuat data live (real-time)
            unsubscribeRealtime = onSnapshot(q, (snapshot) => {
                fileGallery.innerHTML = "";
                snapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const docId = documentSnapshot.id;
                    
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    card.innerHTML = `
                        <img src="${data.fileData}" alt="${data.fileName}">
                        <p><strong>${data.fileName}</strong></p>
                        <div class="card-actions">
                            <a href="${data.fileData}" download="${data.fileName}" style="background:var(--primary); color:#000; padding:5px 10px; border-radius:5px; text-decoration:none; font-size:0.8rem; font-weight:bold;">Download</a>
                            <button onclick="hapusFile('${docId}')" class="btn-danger" style="padding:5px 10px; font-size:0.8rem; margin:0;">Hapus</button>
                        </div>
                    `;
                    fileGallery.appendChild(card);
                });
            });
        }

        // Fungsi Global untuk hapus file
        window.hapusFile = async (docId) => {
            if(confirm("Yakin ingin menghapus dokumen ini selamanya?")) {
                try {
                    await deleteDoc(doc(db, "userFiles", docId));
                } catch (err) { alert("Gagal menghapus!"); }
            }
        };

    </script>
</body>
</html>
