<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Fahril | Secure Datacenter</title>
    <!-- Import Google Material Icons untuk Ikon KTP, KK, dll -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        /* ================= CSS & THEME (FORMAL & FUTURISTIC) ================= */
        :root {
            --bg-dark: #050914;
            --panel-bg: rgba(10, 15, 30, 0.6);
            --panel-border: rgba(69, 243, 255, 0.2);
            --primary: #45f3ff;
            --text-main: #e2e8f0;
            --text-muted: #8b949e;
            --danger: #ff3366;
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Canvas Background - Dibuat lebih lambat & formal */
        #galaxy-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #02040a; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-out;
        }
        .loader-ring {
            width: 80px; height: 80px; border: 3px solid transparent;
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1.5s linear infinite; margin-bottom: 20px;
        }
        .welcome-text {
            font-size: 1.8rem; font-weight: 300; text-align: center; letter-spacing: 2px;
            color: var(--text-main);
        }
        .welcome-text span { color: var(--primary); font-weight: bold; }

        /* Containers & Panels */
        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: none; opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .container.show { opacity: 1; transform: translateY(0); display: block; }

        .glass-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border); border-radius: 12px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* Header & Typography */
        h2, h3 { color: var(--primary); font-weight: 500; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .system-status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--success); }
        .system-status::before { content: ''; width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        /* Forms, Inputs, Select */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group span { position: absolute; left: 12px; top: 12px; color: var(--text-muted); }
        input[type="email"], input[type="password"], input[type="text"], select, input[type="file"] {
            width: 100%; padding: 12px 12px 12px 40px; 
            background: rgba(0,0,0,0.4); border: 1px solid var(--panel-border);
            color: #fff; border-radius: 6px; outline: none; transition: 0.3s;
            font-size: 0.95rem;
        }
        select { padding-left: 12px; cursor: pointer; }
        select option { background: var(--bg-dark); color: #fff; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(69, 243, 255, 0.3); }
        input[type="file"] { padding-left: 12px; }

        button {
            width: 100%; background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 600; 
            letter-spacing: 1px; transition: all 0.3s ease; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(69, 243, 255, 0.4); }
        button.btn-danger { border-color: var(--danger); color: var(--danger); }
        button.btn-danger:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(255, 51, 102, 0.4); }
        button.btn-action { width: auto; padding: 8px 15px; font-size: 0.8rem; }

        /* Biometric Visuals */
        .biometric-scanner {
            text-align: center; margin-bottom: 20px; padding: 20px;
            border: 1px dashed var(--primary); border-radius: 8px; background: rgba(69,243,255,0.05);
        }
        .biometric-scanner .material-symbols-outlined { font-size: 4rem; color: var(--primary); animation: scan 3s infinite; }

        /* Dashboard specific */
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
        .toolbar { display: flex; gap: 15px; width: 100%; margin-top: 10px; align-items: center; }
        .search-box { flex-grow: 1; position: relative; }
        
        /* Grid & Cards */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .file-card {
            background: rgba(0,0,0,0.5); border: 1px solid var(--panel-border);
            border-radius: 10px; padding: 15px; position: relative;
            transition: all 0.3s;
        }
        .file-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(69, 243, 255, 0.15); }
        .file-card .doc-icon {
            position: absolute; top: 15px; right: 15px; background: rgba(69,243,255,0.1);
            padding: 8px; border-radius: 8px; color: var(--primary);
        }
        .file-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .file-card h4 { font-size: 1rem; margin-bottom: 5px; word-break: break-all; }
        .file-card .doc-type { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: inline-block; border: 1px solid var(--primary); padding: 2px 8px; border-radius: 12px; }
        .card-actions { display: flex; gap: 10px; }

        /* Animations */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scan { 0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--primary); } 50% { opacity: 0.5; text-shadow: none; } }

        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; }
            .toolbar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-ring"></div>
        <div class="welcome-text">SECURE DATACENTER<br><span>AHMAD FAHRIL</span></div>
        <p style="margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1px;">INITIALIZING PROTOCOLS...</p>
    </div>

    <!-- Galaxy Canvas -->
    <canvas id="galaxy-canvas"></canvas>

    <!-- Halaman Login (Strict Mode) -->
    <div id="login-section" class="container glass-panel" style="max-width: 420px; margin-top: 8vh;">
        <h2 style="justify-content: center;"><span class="material-symbols-outlined">admin_panel_settings</span> AUTENTIKASI SISTEM</h2>
        <div class="system-status" style="justify-content: center; margin-bottom: 25px;">KONEKSI AMAN</div>
        
        <div class="biometric-scanner">
            <span class="material-symbols-outlined">face</span>
            <p style="margin-top: 10px; font-size: 0.85rem; color: var(--primary);">Menunggu Input Biometrik / Kredensial</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" id="email" placeholder="Administrator Email" required>
            </div>
            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" id="password" placeholder="Passkey / Password" required>
            </div>
            <button type="submit" id="login-btn"><span class="material-symbols-outlined">login</span> VERIFIKASI IDENTITAS</button>
        </form>
    </div>

    <!-- Halaman Dashboard (Datacenter) -->
    <div id="dashboard-section" class="container">
        
        <div class="glass-panel dashboard-header">
            <div>
                <h2><span class="material-symbols-outlined">dns</span> AHMAD FAHRIL DATACENTER</h2>
                <div class="system-status">SERVER STATUS: NORMAL | ENKRIPSI: AKTIF</div>
            </div>
            <button id="logout-btn" class="btn-danger btn-action"><span class="material-symbols-outlined">logout</span> TERMINATE SESSION</button>
        </div>

        <!-- Panel Kontrol (Upload & Search) -->
        <div class="glass-panel">
            <h3><span class="material-symbols-outlined">upload_file</span> Manajemen Data Baru</h3>
            <div class="toolbar">
                <select id="doc-type-select" style="width: auto; min-width: 200px;">
                    <option value="ktp">Kartu Tanda Penduduk (KTP)</option>
                    <option value="kk">Kartu Keluarga (KK)</option>
                    <option value="npwp">Kartu NPWP</option>
                    <option value="sim">Surat Izin Mengemudi (SIM)</option>
                    <option value="paspor">Paspor</option>
                    <option value="lainnya">Dokumen Lainnya</option>
                </select>
                <input type="file" id="file-input" accept="image/*" style="flex-grow: 1;">
                <button id="upload-btn" class="btn-action" style="width: auto; min-width: 150px;"><span class="material-symbols-outlined">cloud_upload</span> UPLOAD DATA</button>
            </div>
        </div>

        <div class="toolbar" style="margin-bottom: 20px;">
            <div class="search-box">
                <span class="material-symbols-outlined" style="position: absolute; left: 12px; top: 12px; color: var(--primary);">search</span>
                <input type="text" id="search-input" placeholder="Cari berdasarkan nama file atau jenis dokumen..." style="padding-left: 45px; background: var(--panel-bg);">
            </div>
        </div>

        <!-- Grid Data -->
        <div class="file-grid" id="file-gallery">
            <!-- Data file akan dirender di sini via Javascript -->
        </div>
    </div>

    <!-- ================= JAVASCRIPT & FIREBASE ================= -->
    <script type="module">
        // 1. IMPORT FIREBASE CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. CONFIG FIREBASE 
        // GANTI VALUE DI BAWAH INI SESUAI FIREBASE CONSOLE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyCqDdj5gTLPrFd-yYhDUJ__w8w-5ZOxk_M",
            authDomain: "amdfdatacenter.firebaseapp.com",
            projectId: "amdfdatacenter",
            storageBucket: "amdfdatacenter.firebasestorage.app",
            messagingSenderId: "484525213430",
            appId: "1:484525213430:web:d7aff2639a8fd26cd28ed7",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Referensi UI
        const preloader = document.getElementById('preloader');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const fileGallery = document.getElementById('file-gallery');
        const searchInput = document.getElementById('search-input');
        
        let currentUser = null;
        let unsubscribeRealtime = null;
        let allFilesData = []; // Untuk fitur search lokal

        // 3. LOGIC PRELOADER
        setTimeout(() => {
            preloader.style.opacity = '0';
            setTimeout(() => { preloader.style.display = 'none'; }, 1000);
            checkAuthStatus(); 
        }, 3000); // Dipercepat menjadi 3 detik untuk efisiensi

        // 4. ANIMASI GALAXY BACKGROUND (Formal/Lambat)
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.2; // Gerak sangat lambat/formal
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.color = Math.random() > 0.8 ? '#45f3ff' : '#4a5568';
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0; else if(this.x < 0) this.x = canvas.width;
                if(this.y > canvas.height) this.y = 0; else if(this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // 5. AUTHENTICATION SYSTEM (Strict Login ONLY)
        function checkAuthStatus() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loginSection.classList.remove('show');
                    setTimeout(() => dashboardSection.classList.add('show'), 500);
                    loadDataFirestore();
                } else {
                    currentUser = null;
                    dashboardSection.classList.remove('show');
                    if (unsubscribeRealtime) unsubscribeRealtime();
                    setTimeout(() => loginSection.classList.add('show'), 500);
                }
            });
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = `<span class="material-symbols-outlined">sync</span> MEMVERIFIKASI...`;
            try {
                // HANYA FUNGSI LOGIN (Pendaftaran telah dihapus)
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Akses Ditolak: Kredensial tidak valid atau akun belum terdaftar di sistem pusat.");
                btn.innerHTML = `<span class="material-symbols-outlined">login</span> VERIFIKASI IDENTITAS`;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if(confirm("Terminate current secure session?")) signOut(auth);
        });

        // 6. MAP IKON BERDASARKAN TIPE DOKUMEN
        const iconMap = {
            ktp: 'badge',
            kk: 'family_home',
            npwp: 'account_balance',
            sim: 'drive_eta',
            paspor: 'flight_takeoff',
            lainnya: 'folder_open'
        };

        // 7. UPLOAD LOGIC & COMPRESSION
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const cvs = document.createElement('canvas');
                        cvs.width = width; cvs.height = height;
                        cvs.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(cvs.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('file-input');
            const docType = document.getElementById('doc-type-select').value;
            const docTypeName = document.getElementById('doc-type-select').options[document.getElementById('doc-type-select').selectedIndex].text;
            
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file gambar untuk dienkripsi!");
            if (!currentUser) return;

            const btn = document.getElementById('upload-btn');
            btn.innerHTML = `<span class="material-symbols-outlined">sync</span> MENGUNGGAH...`;
            
            try {
                const base64Data = await compressImage(file, 1200, 1200, 0.7);
                await addDoc(collection(db, "userFiles"), {
                    uid: currentUser.uid,
                    fileName: file.name,
                    fileData: base64Data,
                    docType: docType,
                    docTypeName: docTypeName,
                    timestamp: serverTimestamp()
                });
                fileInput.value = "";
                alert("Data berhasil dienkripsi dan diunggah ke datacenter.");
            } catch (error) { alert("Gagal upload: " + error.message); }
            
            btn.innerHTML = `<span class="material-symbols-outlined">cloud_upload</span> UPLOAD DATA`;
        });

        // 8. REALTIME LISTENER & SEARCH LOGIC
        function loadDataFirestore() {
            if (!currentUser) return;
            const q = query(collection(db, "userFiles"), where("uid", "==", currentUser.uid));
            
            unsubscribeRealtime = onSnapshot(q, (snapshot) => {
                allFilesData = [];
                snapshot.forEach((doc) => {
                    allFilesData.push({ id: doc.id, ...doc.data() });
                });
                renderGallery(allFilesData);
            });
        }

        function renderGallery(dataArray) {
            fileGallery.innerHTML = "";
            if(dataArray.length === 0) {
                fileGallery.innerHTML = `<p style="color: var(--text-muted); grid-column: 1 / -1; text-align: center;">Tidak ada data ditemukan dalam arsip.</p>`;
                return;
            }

            dataArray.forEach((data) => {
                const iconName = iconMap[data.docType] || 'folder';
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="doc-icon"><span class="material-symbols-outlined">${iconName}</span></div>
                    <span class="doc-type">${data.docTypeName || 'Dokumen'}</span>
                    <h4>${data.fileName}</h4>
                    <img src="${data.fileData}" alt="${data.fileName}">
                    <div class="card-actions">
                        <a href="${data.fileData}" download="${data.fileName}" class="btn-action" style="flex-grow:1; text-align:center; text-decoration:none; display:block; background:rgba(69,243,255,0.1); color:var(--primary); border:1px solid var(--primary); padding:8px; border-radius:6px; font-weight:bold;">DOWNLOAD</a>
                        <button onclick="hapusFile('${data.id}')" class="btn-danger btn-action" title="Hapus Data"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                `;
                fileGallery.appendChild(card);
            });
        }

        // Fitur Search Lokal
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filteredData = allFilesData.filter(item => 
                item.fileName.toLowerCase().includes(term) || 
                (item.docTypeName && item.docTypeName.toLowerCase().includes(term))
            );
            renderGallery(filteredData);
        });

        // Global Delete Function
        window.hapusFile = async (docId) => {
            if(confirm("PERINGATAN: Tindakan ini akan menghapus data secara permanen dari server. Lanjutkan?")) {
                try { await deleteDoc(doc(db, "userFiles", docId)); } 
                catch (err) { alert("Gagal menghapus data!"); }
            }
        };

    </script>
</body>
</html>
