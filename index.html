<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Fahril | Secure Datacenter</title>
    <!-- Import Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        /* ================= COLOR PALETTE & THEMES ================= */
        :root {
            --bg-base: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #0ea5e9; 
            --primary-hover: #0284c7;
            --danger: #ef4444;
            --success: #10b981;
            --particle-color: rgba(14, 165, 233, 0.15);
            --particle-line: rgba(14, 165, 233, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-base: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --danger: #dc2626;
            --success: #059669;
            --particle-color: rgba(2, 132, 199, 0.15);
            --particle-line: rgba(2, 132, 199, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* ================= GLOBAL STYLES ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }

        /* Canvas Background */
        #network-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Top Navigation / Theme Toggle */
        .top-nav { position: fixed; top: 0; right: 0; padding: 15px 25px; z-index: 100; display: flex; justify-content: flex-end; width: 100%; }
        .theme-btn {
            background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; font-weight: 500; box-shadow: var(--shadow);
        }
        .theme-btn:hover { border-color: var(--primary); }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out;
        }
        .loader-line { width: 150px; height: 2px; background: var(--border-color); margin-bottom: 20px; position: relative; overflow: hidden; }
        .loader-line::after { content: ''; position: absolute; left: -50px; top: 0; height: 100%; width: 50px; background: var(--primary); animation: slide 1.5s infinite ease-in-out; }
        .welcome-text { font-size: 1.5rem; font-weight: 600; letter-spacing: 1px; color: var(--text-main); }

        /* Containers & Panels */
        .container {
            max-width: 1200px; margin: 60px auto 20px auto; padding: 20px;
            display: none; opacity: 0; transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .container.show { opacity: 1; transform: translateY(0); display: block; }

        .panel {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 25px; box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        /* Typography */
        h2, h3 { color: var(--text-main); font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-size: 1.25rem; }
        .system-status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: var(--success); letter-spacing: 0.5px; border: 1px solid var(--border-color); padding: 4px 10px; border-radius: 4px; background: var(--bg-base); }
        .system-status::before { content: ''; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        /* Forms & Inputs */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        input[type="email"], input[type="password"], input[type="text"], select {
            width: 100%; padding: 12px 12px 12px 40px; 
            background: var(--bg-base); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 6px; outline: none; font-size: 0.95rem;
        }
        input[type="file"] {
            width: 100%; padding: 10px; background: var(--bg-base); border: 1px dashed var(--border-color);
            color: var(--text-main); border-radius: 6px; cursor: pointer;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.1); }

        /* Buttons */
        button {
            background: var(--primary); color: #ffffff; border: none;
            padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; 
            transition: all 0.2s ease; display: inline-flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        button:hover { background: var(--primary-hover); }
        button.btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        button.btn-outline:hover { border-color: var(--text-main); background: var(--bg-base); }
        button.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        button.btn-danger:hover { background: var(--danger); color: #ffffff; }

        /* Biometric Visuals */
        .biometric-scanner { text-align: center; margin-bottom: 25px; padding: 20px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-base); }
        .biometric-scanner .material-symbols-outlined { font-size: 3.5rem; color: var(--text-muted); }

        /* Dashboard specific */
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; }
        .toolbar { display: flex; gap: 15px; width: 100%; margin-top: 15px; align-items: center; flex-wrap: wrap; }
        .search-box { flex-grow: 1; position: relative; min-width: 250px; }
        
        /* Grid & Cards */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .file-card {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 15px; position: relative;
            display: flex; flex-direction: column; box-shadow: var(--shadow);
        }
        .file-card:hover { border-color: var(--primary); }
        .file-card .doc-icon {
            position: absolute; top: 15px; right: 15px; background: var(--bg-base); border: 1px solid var(--border-color);
            padding: 6px; border-radius: 6px; color: var(--text-main); display: flex;
        }
        .file-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; margin: 15px 0; border: 1px solid var(--border-color); background: var(--bg-base); }
        .file-card h4 { font-size: 0.95rem; margin-bottom: 5px; word-break: break-all; font-weight: 500; padding-right: 35px; }
        .file-card .doc-type { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .card-actions { display: flex; gap: 10px; margin-top: auto; }
        .card-actions > * { flex: 1; }

        @keyframes slide { 0% { left: -50px; } 100% { left: 100%; } }

        @media (max-width: 768px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <div class="top-nav">
        <button class="theme-btn" id="theme-toggle">
            <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
            <span id="theme-text">Light Mode</span>
        </button>
    </div>

    <!-- Preloader -->
    <div id="preloader">
        <div class="welcome-text">DATACENTER INITIALIZATION</div>
        <p style="margin: 10px 0 20px 0; color: var(--text-muted); font-size: 0.85rem;">SECURE CONNECTION ESTABLISHED</p>
        <div class="loader-line"></div>
    </div>

    <!-- Background Canvas (Formal Network Nodes) -->
    <canvas id="network-canvas"></canvas>

    <!-- Halaman Login -->
    <div id="login-section" class="container panel" style="max-width: 400px; margin-top: 12vh;">
        <h2 style="justify-content: center; margin-bottom: 20px;"><span class="material-symbols-outlined">admin_panel_settings</span> OTENTIKASI SISTEM</h2>
        
        <div class="biometric-scanner">
            <span class="material-symbols-outlined">face</span>
            <p style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">Akses Biometrik & Kredensial</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" id="email" placeholder="Email Administrator" required>
            </div>
            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" id="password" placeholder="Kata Sandi Utama" required>
            </div>
            <button type="submit" id="login-btn" style="width: 100%;"><span class="material-symbols-outlined">login</span> VERIFIKASI AKSES</button>
        </form>
    </div>

    <!-- Halaman Dashboard (Datacenter) -->
    <div id="dashboard-section" class="container">
        
        <div class="panel dashboard-header">
            <div>
                <h2><span class="material-symbols-outlined">storage</span> DATACENTER PRIBADI</h2>
                <div class="system-status">STATUS: NORMAL</div>
                <div class="system-status" style="margin-left: 5px;">VOL POWER: NORMAL</div>
            </div>
            <button id="logout-btn" class="btn-danger"><span class="material-symbols-outlined">power_settings_new</span> LOGOUT SESSION</button>
        </div>

        <!-- Panel Kontrol (Upload & Search) -->
        <div class="panel">
            <h3><span class="material-symbols-outlined">add_box</span> Manajemen Arsip Baru</h3>
            <div class="toolbar">
                <div class="input-group" style="margin: 0; min-width: 200px;">
                    <span class="material-symbols-outlined">category</span>
                    <select id="doc-type-select">
                        <option value="ktp">Kartu Tanda Penduduk (KTP)</option>
                        <option value="kk">Kartu Keluarga (KK)</option>
                        <option value="npwp">Kartu NPWP</option>
                        <option value="sim">Surat Izin Mengemudi (SIM)</option>
                        <option value="paspor">Paspor</option>
                        <option value="lainnya">Dokumen Lainnya</option>
                    </select>
                </div>
                <input type="file" id="file-input" accept="image/*" style="flex-grow: 1;">
                <button id="upload-btn"><span class="material-symbols-outlined">upload</span> UNGGAH</button>
            </div>
        </div>

        <div class="toolbar" style="margin-bottom: 20px;">
            <div class="search-box">
                <span class="material-symbols-outlined" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);">search</span>
                <input type="text" id="search-input" placeholder="Cari berdasarkan nama file atau kategori dokumen..." style="padding-left: 45px;">
            </div>
        </div>

        <!-- Grid Data -->
        <div class="file-grid" id="file-gallery">
            <!-- Data file akan dirender di sini via Javascript -->
        </div>
    </div>

    <!-- ================= JAVASCRIPT & FIREBASE ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqDdj5gTLPrFd-yYhDUJ__w8w-5ZOxk_M",
            authDomain: "amdfdatacenter.firebaseapp.com",
            projectId: "amdfdatacenter",
            storageBucket: "amdfdatacenter.firebasestorage.app",
            messagingSenderId: "484525213430",
            appId: "1:484525213430:web:d7aff2639a8fd26cd28ed7",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const preloader = document.getElementById('preloader');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const fileGallery = document.getElementById('file-gallery');
        const searchInput = document.getElementById('search-input');
        
        let currentUser = null;
        let unsubscribeRealtime = null;
        let allFilesData = []; 

        // THEME TOGGLE LOGIC
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        
        // Cek LocalStorage untuk preferensi tema sebelumnya
        const savedTheme = localStorage.getItem('datacenter_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('datacenter_theme', targetTheme);
            updateThemeUI(targetTheme);
        });

        function updateThemeUI(theme) {
            if (theme === 'light') {
                themeIcon.textContent = 'dark_mode';
                themeText.textContent = 'Dark Mode';
            } else {
                themeIcon.textContent = 'light_mode';
                themeText.textContent = 'Light Mode';
            }
        }

        // PRELOADER
        setTimeout(() => {
            preloader.style.opacity = '0';
            setTimeout(() => { preloader.style.display = 'none'; }, 500);
            checkAuthStatus(); 
        }, 1500);

        // FORMAL NETWORK CANVAS ANIMATION
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                // Mengambil warna dari CSS Variables agar dinamis dengan tema
                const style = getComputedStyle(document.body);
                ctx.fillStyle = style.getPropertyValue('--particle-color').trim() || 'rgba(128,128,128,0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        for (let i = 0; i < 70; i++) particles.push(new Node());

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const style = getComputedStyle(document.body);
            const lineColor = style.getPropertyValue('--particle-line').trim() || 'rgba(128,128,128,0.1)';

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = lineColor;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // AUTHENTICATION
        function checkAuthStatus() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loginSection.classList.remove('show');
                    setTimeout(() => dashboardSection.classList.add('show'), 300);
                    loadDataFirestore();
                } else {
                    currentUser = null;
                    dashboardSection.classList.remove('show');
                    if (unsubscribeRealtime) unsubscribeRealtime();
                    setTimeout(() => loginSection.classList.add('show'), 300);
                }
            });
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = `<span class="material-symbols-outlined">sync</span> MEMVERIFIKASI...`;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Akses Ditolak: Pastikan kredensial yang dimasukkan adalah milik Administrator.");
                btn.innerHTML = `<span class="material-symbols-outlined">login</span> VERIFIKASI AKSES`;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if(confirm("Tutup sesi aman ini?")) signOut(auth);
        });

        // ICON MAP
        const iconMap = {
            ktp: 'badge', kk: 'family_home', npwp: 'account_balance',
            sim: 'drive_eta', paspor: 'flight_takeoff', lainnya: 'folder_open'
        };

        // UPLOAD & COMPRESSION
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const cvs = document.createElement('canvas');
                        cvs.width = width; cvs.height = height;
                        cvs.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(cvs.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('file-input');
            const docTypeSelect = document.getElementById('doc-type-select');
            const docType = docTypeSelect.value;
            const docTypeName = docTypeSelect.options[docTypeSelect.selectedIndex].text;
            
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file gambar terlebih dahulu.");
            if (!currentUser) return;

            const btn = document.getElementById('upload-btn');
            btn.innerHTML = `<span class="material-symbols-outlined">sync</span> MEMPROSES...`;
            
            try {
                const base64Data = await compressImage(file, 1200, 1200, 0.7);
                await addDoc(collection(db, "userFiles"), {
                    uid: currentUser.uid,
                    fileName: file.name,
                    fileData: base64Data,
                    docType: docType,
                    docTypeName: docTypeName,
                    timestamp: serverTimestamp()
                });
                fileInput.value = "";
                alert("Data berhasil diarsipkan.");
            } catch (error) { alert("Gagal unggah: " + error.message); }
            
            btn.innerHTML = `<span class="material-symbols-outlined">upload</span> UNGGAH`;
        });

        // FIRESTORE LISTENER & RENDER
        function loadDataFirestore() {
            if (!currentUser) return;
            const q = query(collection(db, "userFiles"), where("uid", "==", currentUser.uid));
            
            unsubscribeRealtime = onSnapshot(q, (snapshot) => {
                allFilesData = [];
                snapshot.forEach((doc) => {
                    allFilesData.push({ id: doc.id, ...doc.data() });
                });
                renderGallery(allFilesData);
            });
        }

        function renderGallery(dataArray) {
            fileGallery.innerHTML = "";
            if(dataArray.length === 0) {
                fileGallery.innerHTML = `<p style="color: var(--text-muted); grid-column: 1 / -1; text-align: center; padding: 40px 0;">Tidak ada arsip dokumen ditemukan.</p>`;
                return;
            }

            dataArray.forEach((data) => {
                const iconName = iconMap[data.docType] || 'folder';
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="doc-icon"><span class="material-symbols-outlined">${iconName}</span></div>
                    <span class="doc-type">${data.docTypeName || 'Dokumen'}</span>
                    <h4>${data.fileName}</h4>
                    <img src="${data.fileData}" alt="${data.fileName}">
                    <div class="card-actions">
                        <a href="${data.fileData}" download="${data.fileName}" class="btn-outline" style="text-decoration:none; display:flex; justify-content:center; align-items:center; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px; border-radius: 6px; font-weight: 500; font-size: 0.85rem;"><span class="material-symbols-outlined" style="font-size:1.1rem; margin-right:4px;">download</span> UNDUH</a>
                        <button onclick="hapusFile('${data.id}')" class="btn-danger" style="padding: 8px; font-size: 0.85rem;"><span class="material-symbols-outlined" style="font-size:1.1rem; margin-right:4px;">delete</span> HAPUS</button>
                    </div>
                `;
                fileGallery.appendChild(card);
            });
        }

        // SEARCH 
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filteredData = allFilesData.filter(item => 
                item.fileName.toLowerCase().includes(term) || 
                (item.docTypeName && item.docTypeName.toLowerCase().includes(term))
            );
            renderGallery(filteredData);
        });

        // DELETE GLOBAL
        window.hapusFile = async (docId) => {
            if(confirm("Hapus arsip ini dari database secara permanen?")) {
                try { await deleteDoc(doc(db, "userFiles", docId)); } 
                catch (err) { alert("Gagal menghapus arsip."); }
            }
        };

    </script>
</body>
</html>
